name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Installer les dépendances
        run: npm install
      - name: Build du web
        run: npm run build
      - name: Ajouter la plateforme Android
        run: npx cap add android
      - name: Synchroniser
        run: npx cap sync android
      - name: Construire l'APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Uploader l'APK
        uses: actions/upload-artifact@v4
        with:
          name: grabi-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Generer la cle d'upload
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/grabi-upload.jks" \
            -alias grabi -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass grabistore -keypass grabistore \
            -dname "CN=Grabi, OU=Grabi, O=Grabi, L=Paris, ST=Ile-de-France, C=FR"
      - name: Construire le bundle release (.aab)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon
      - name: Signer l'AAB
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name '*.aab' | head -1)
          echo "AAB: $AAB"
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$RUNNER_TEMP/grabi-upload.jks" \
            -storepass grabistore -keypass grabistore \
            "$AAB" grabi
          cp "$AAB" grabi-release.aab
      - name: Uploader l'AAB
        uses: actions/upload-artifact@v4
        with:
          name: grabi-aab
          path: |
            grabi-release.aab
            grabi-upload.jks
          if-no-files-found: error
